<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>4.6 datalist tags</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>

<body>
  <!--example form with a datalist-->
  <form name="example" action="#" method="POST">
      <label for="language">Select or type a language:</label>
      <input list="languages" name="language">
      <datalist id="languages">
          <option value="English">
          <option value="Spanish">
          <option value="Bangla">
          <option value="Chinese">
      </datalist>
      <br><br>
      <input type="submit">
  </form>

  <!--exercise 1-->
 <form name="Shoes" action="#" method="POST">
      <label for="shoe">Select or type a shoe brand:</label>
      <input list="shoes" name="shoe">
      <datalist id="shoes">
          <option value="Nike">
          <option value="Adidas">
          <option value="Puma">
          <option value="Reebok">
      </datalist>
      <br><br>
      <input type="submit">

  <!--exercise 2-->
<form name="cities" action="#" method="POST">
      <label for="city">Select or type a city:</label>
      <input list="cities" name="city">
      <datalist id="cities">
          <option value="New York">
          <option value="Los Angeles">
          <option value="Chicago">
          <option value="Philidelphia">
          <option value="Baltimore">
      </datalist>
      <br><br>
      <input type="submit">

  <!--exercise 3-->

  <form name="Music artists" action="#" method="POST">
      <label for="artist">Select or type a music artist:</label>
      <input list="artists" name="artist">

          <option value="Ariana Grande">
          <option value="Justin Bieber">
          <option value="Beyonce">
      </datalist>
      <br><br>
      <input type="submit">

</body>

</html>
